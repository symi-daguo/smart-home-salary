services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    # 生产建议：不要对公网暴露 18789；如需远程访问 Control UI，请走 VPN/内网/白名单
    # ports:
    #   - '18789:18789'
    environment:
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?set in .env.prod}
    volumes:
      - openclaw_state:/home/node/.openclaw
      - openclaw_workspace:/home/node/workspace
      - ../skills:/home/node/workspace/skills:ro

  openclaw-init:
    image: ghcr.io/openclaw/openclaw:latest
    user: '0:0'
    restart: 'no'
    command: >
      sh -lc "
      mkdir -p /home/node/.openclaw /home/node/workspace &&
      chown -R 1000:1000 /home/node/.openclaw /home/node/workspace
      "
    volumes:
      - openclaw_state:/home/node/.openclaw
      - openclaw_workspace:/home/node/workspace

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-salary}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-salary}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # 生产：不要对公网暴露数据库端口（通过安全组/内网访问）
    # ports:
    #   - '5432:5432'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    # 生产：不要对公网暴露 Redis 端口
    # ports:
    #   - '6379:6379'

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env.prod}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    # 生产：建议不暴露 console（9001）；若需运维访问，限制到内网/白名单
    # ports:
    #   - '9000:9000'
    #   - '9001:9001'

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/${S3_BUCKET:-salary-uploads} || true &&
      mc anonymous set download local/${S3_BUCKET:-salary-uploads} || true
      "

  api:
    image: infra-api
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-salary}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set in .env.prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set in .env.prod}
      FRONTEND_URL: ${FRONTEND_URL:?set in .env.prod}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_LIMIT: ${RATE_LIMIT_LIMIT:-100}
      # Object storage (MinIO / S3 compatible)
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-${MINIO_ROOT_USER:-minioadmin}}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-${MINIO_ROOT_PASSWORD}}
      S3_BUCKET: ${S3_BUCKET:-salary-uploads}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:?set in .env.prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    # 生产建议：不直接暴露 API 端口到公网，走反代同域转发（例如 nginx/caddy）
    # ports:
    #   - '3000:3000'

  web:
    image: infra-web
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '80:80'
    # 生产建议：如需 HTTPS，使用云负载均衡/反向代理终止 TLS，然后转发到本容器 80

volumes:
  postgres_data:
  redis_data:
  minio_data:
  openclaw_state:
  openclaw_workspace:

