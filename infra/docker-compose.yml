services:
  postgres:
    image: postgres:17-alpine
    container_name: salary_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: salary
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d salary']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: salary_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: salary_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    # 开发期先不加健康检查：MinIO 镜像未必包含 mc 工具

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: salary_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/salary-uploads || true &&
      mc anonymous set download local/salary-uploads || true
      "

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    container_name: salary_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/salary
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: change-me-in-production
      JWT_REFRESH_SECRET: change-me-in-production-too
      FRONTEND_URL: http://localhost:5173
      # Object storage (MinIO / S3 compatible)
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: salary-uploads
      S3_PUBLIC_BASE_URL: http://localhost:9000/salary-uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: salary_web
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - api

  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: salary_openclaw_gateway
    restart: unless-stopped
    ports:
      - '18789:18789'
    environment:
      # OpenClaw Docker 文档建议使用 bind 模式值（lan/loopback），便于宿主机访问发布端口
      OPENCLAW_GATEWAY_BIND: lan
      # 该 token 用于 Control UI 与设备配对审批（请在生产环境改为强随机值，并妥善保存）
      OPENCLAW_GATEWAY_TOKEN: change-me-in-production-openclaw
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    volumes:
      # 持久化 OpenClaw 状态（agents/sessions/config 等）
      - openclaw_state:/home/node/.openclaw
      # 持久化 workspace（skills 与本地文件）
      - openclaw_workspace:/home/node/workspace
      # 将本仓库的 skills 注入到 OpenClaw workspace（只读，避免误改）
      - ../skills:/home/node/workspace/skills:ro

  # 一次性初始化：修复 Docker named volume 的权限（镜像默认以 node 用户运行）
  openclaw-init:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: salary_openclaw_init
    user: '0:0'
    restart: 'no'
    command: >
      sh -lc "
      mkdir -p /home/node/.openclaw /home/node/workspace &&
      chown -R 1000:1000 /home/node/.openclaw /home/node/workspace
      "
    volumes:
      - openclaw_state:/home/node/.openclaw
      - openclaw_workspace:/home/node/workspace

  # 可选：OpenClaw CLI 容器（按需执行，不需要长期运行）
  # 用法示例：
  # - docker compose -f infra/docker-compose.yml run --rm openclaw-cli dashboard --no-open
  # - docker compose -f infra/docker-compose.yml run --rm openclaw-cli devices list
  # - docker compose -f infra/docker-compose.yml run --rm openclaw-cli devices approve <requestId>
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: salary_openclaw_cli
    profiles: ['tools']
    network_mode: 'service:openclaw-gateway'
    depends_on:
      - openclaw-gateway
    environment:
      OPENCLAW_GATEWAY_TOKEN: change-me-in-production-openclaw
    volumes:
      - openclaw_state:/home/node/.openclaw
      - openclaw_workspace:/home/node/workspace
      - ../skills:/home/node/workspace/skills:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
  openclaw_state:
  openclaw_workspace:

