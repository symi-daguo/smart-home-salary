name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            bundleArgs: ''
          - platform: 'ubuntu-22.04'
            target: ''
            bundleArgs: ''
          - platform: 'windows-latest'
            target: ''
            # Windows runner 上 MSI 依赖 WiX，失败时会导致整体打包失败；
            # 这里先只打 NSIS（exe），确保能稳定产出可交付安装包。
            bundleArgs: '--bundles nsis'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Rust (Stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libsqlite3-dev pkg-config libssl-dev

      - name: Install dependencies (npm workspaces)
        run: npm install

      - name: Build API and prepare B resources
        shell: bash
        run: |
          set -euo pipefail

          WORKSPACE="${{ github.workspace }}"
          API_DIR="$WORKSPACE/apps/api"

          mkdir -p "$WORKSPACE/src-tauri/resources/api"
          mkdir -p "$WORKSPACE/src-tauri/resources/binaries"

          cd "$API_DIR"

          printf 'DATABASE_URL=%s\nREDIS_HOST=%s\nREDIS_PORT=%s\nJWT_ACCESS_SECRET=%s\nJWT_REFRESH_SECRET=%s\nFRONTEND_URL=%s\nS3_ENDPOINT=%s\nS3_REGION=%s\nS3_ACCESS_KEY_ID=%s\nS3_SECRET_ACCESS_KEY=%s\nS3_BUCKET=%s\nS3_PUBLIC_BASE_URL=%s\n' \
            '"postgresql://postgres:postgres@localhost:5432/salary"' \
            '"localhost"' \
            '"6379"' \
            '"dev-access-secret-change-in-production"' \
            '"dev-refresh-secret-change-in-production"' \
            '"http://localhost:5173"' \
            '"http://localhost:9000"' \
            '"us-east-1"' \
            '"minioadmin"' \
            '"minioadmin"' \
            '"salary-uploads"' \
            '"http://localhost:9000/salary-uploads"' \
            > .env

          echo "Generating Prisma Client..."
          npx prisma generate

          echo "Building API..."
          npm run build

          echo "Creating SQLite seed database for offline mode..."
          cd "$API_DIR"
          rm -f prisma/desktop-seed.db
          cp prisma/schema.sqlite.prisma prisma/schema.temp.prisma
          export DATABASE_URL="file:./prisma/desktop-seed.db"
          npx prisma db push --schema prisma/schema.temp.prisma --skip-generate
          rm -f prisma/schema.temp.prisma
          echo "Running desktop seed script to create initial users..."
          npx ts-node --compiler-options '{"module":"CommonJS"}' prisma/seed-desktop.ts || echo "Seed script failed, continuing..."
          if [ -f "$API_DIR/prisma/desktop-seed.db" ]; then
            cp -f "$API_DIR/prisma/desktop-seed.db" "$WORKSPACE/src-tauri/resources/binaries/seed.db"
            echo "Seed database copied successfully"
          else
            echo "WARNING: Seed database not found at $API_DIR/prisma/desktop-seed.db"
          fi

          echo "Copying API to resources (including node_modules for B方案)..."
          mkdir -p "$WORKSPACE/src-tauri/resources/api"
          mkdir -p "$WORKSPACE/src-tauri/resources/binaries"

          echo "Checking workspace structure..."
          echo "Root node_modules:"
          du -sh "$WORKSPACE/node_modules" 2>/dev/null || echo "Root node_modules not found"
          echo "API node_modules:"
          du -sh "$API_DIR/node_modules" 2>/dev/null || echo "API node_modules not found"

          echo "Copying dist..."
          cp -r "$API_DIR/dist" "$WORKSPACE/src-tauri/resources/api/" && echo "dist copied" || echo "dist copy failed"
          echo "Copying src..."
          cp -r "$API_DIR/src" "$WORKSPACE/src-tauri/resources/api/" && echo "src copied" || echo "src copy failed"
          echo "Copying prisma..."
          cp -r "$API_DIR/prisma" "$WORKSPACE/src-tauri/resources/api/" && echo "prisma copied" || echo "prisma copy failed"

          echo "Copying node_modules (trying API dir first, then root)..."
          if [ -d "$API_DIR/node_modules" ]; then
            cp -r "$API_DIR/node_modules" "$WORKSPACE/src-tauri/resources/api/" && echo "node_modules copied from API dir" || echo "node_modules copy from API dir failed"
          elif [ -d "$WORKSPACE/node_modules" ]; then
            cp -r "$WORKSPACE/node_modules" "$WORKSPACE/src-tauri/resources/api/" && echo "node_modules copied from root" || echo "node_modules copy from root failed"
          else
            echo "WARNING: No node_modules found anywhere!"
          fi

          echo "Copying config files..."
          cp "$API_DIR/package.json" "$WORKSPACE/src-tauri/resources/api/" && echo "package.json copied"
          cp "$API_DIR/package-lock.json" "$WORKSPACE/src-tauri/resources/api/" && echo "package-lock.json copied"
          cp "$API_DIR/tsconfig.json" "$WORKSPACE/src-tauri/resources/api/" && echo "tsconfig.json copied"
          cp "$API_DIR/nest-cli.json" "$WORKSPACE/src-tauri/resources/api/" && echo "nest-cli.json copied"
          cp "$API_DIR/.env" "$WORKSPACE/src-tauri/resources/api/" && echo ".env copied"

          echo "Resources prepared successfully"
          echo "Verifying copied resources:"
          du -sh "$WORKSPACE/src-tauri/resources/api/" || echo "API dir empty"
          du -sh "$WORKSPACE/src-tauri/resources/api/node_modules" && echo "node_modules verified" || echo "node_modules MISSING!"

      - name: Build frontend (apps/web)
        run: npm --workspace apps/web run build

      # Cargo.lock needs to include newly added Rust deps (e.g. tauri-plugin-sql).
      # CI runners have Rust installed; generate/update lockfile to avoid --locked failures.
      - name: Generate Cargo.lock (src-tauri)
        shell: bash
        run: |
          cd src-tauri
          cargo generate-lockfile

      # Capture build logs as an artifact so failures are diagnosable.
      # Note: This runs an explicit build once to preserve logs, then tauri-action performs the official release build/upload.
      - name: Build Tauri app (capture log)
        id: tauri_build_log
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          echo "Running: npm run tauri build -- ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }} ${{ matrix.bundleArgs }} --verbose"
          npm run tauri build -- ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }} ${{ matrix.bundleArgs }} --verbose 2>&1 | tee tauri-build.log

      - name: Upload tauri build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-${{ matrix.platform }}
          path: tauri-build.log

      - name: Emit failure tail to annotations
        if: steps.tauri_build_log.outcome != 'success'
        shell: bash
        run: |
          echo "---- tauri-build.log (last 120 lines) ----"
          tail -n 120 tauri-build.log || true

          tail -n 20 tauri-build.log > tauri-build.tail.txt || true
          python - <<'PY'
          import pathlib
          p = pathlib.Path("tauri-build.tail.txt")
          s = p.read_text(errors="ignore") if p.exists() else ""
          s = s.strip()[-4000:]
          s = s.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=Tauri build failed::Last lines:%0A{s}")
          PY

      - name: Fail if tauri build failed
        if: steps.tauri_build_log.outcome != 'success'
        shell: bash
        run: |
          echo "Tauri build failed; see artifact tauri-build.log"
          exit 1

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUST_BACKTRACE: 1
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SmartHome v__VERSION__'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target != '' && format('--target {0} {1} --verbose', matrix.target, matrix.bundleArgs) || format('{0} --verbose', matrix.bundleArgs) }}
