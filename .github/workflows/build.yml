name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            bundleArgs: ''
          - platform: 'ubuntu-22.04'
            target: ''
            bundleArgs: ''
          - platform: 'windows-latest'
            target: ''
            # Windows runner 上 MSI 依赖 WiX，失败时会导致整体打包失败；
            # 这里先只打 NSIS（exe），确保能稳定产出可交付安装包。
            bundleArgs: '--bundles nsis'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Rust (Stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libsqlite3-dev pkg-config libssl-dev

      - name: Install dependencies (npm workspaces)
        run: npm install

      - name: Build API and prepare B resources
        shell: bash
        run: |
          set -euo pipefail

          WORKSPACE="${{ github.workspace }}"
          API_DIR="$WORKSPACE/apps/api"

          mkdir -p "$WORKSPACE/src-tauri/resources/api"
          mkdir -p "$WORKSPACE/src-tauri/resources/binaries"

          cd "$API_DIR"

          cat > .env << 'EOF'
DATABASE_URL="postgresql://postgres:postgres@localhost:5432/salary"
REDIS_HOST="localhost"
REDIS_PORT="6379"
JWT_ACCESS_SECRET="dev-access-secret-change-in-production"
JWT_REFRESH_SECRET="dev-refresh-secret-change-in-production"
FRONTEND_URL="http://localhost:5173"
S3_ENDPOINT="http://localhost:9000"
S3_REGION="us-east-1"
S3_ACCESS_KEY_ID="minioadmin"
S3_SECRET_ACCESS_KEY="minioadmin"
S3_BUCKET="salary-uploads"
S3_PUBLIC_BASE_URL="http://localhost:9000/salary-uploads"
EOF

          echo "Generating Prisma Client..."
          npx prisma generate

          echo "Building API..."
          npm run build

          echo "Creating SQLite seed database for offline mode..."
          cd "$API_DIR"
          rm -f prisma/desktop-seed.db
          cp prisma/schema.sqlite.prisma prisma/schema.temp.prisma
          export DATABASE_URL="file:./prisma/desktop-seed.db"
          npx prisma db push --schema prisma/schema.temp.prisma --skip-generate
          rm -f prisma/schema.temp.prisma
          cp -f "$API_DIR/prisma/desktop-seed.db" "$WORKSPACE/src-tauri/resources/binaries/seed.db" 2>/dev/null || echo "No seed db found"

          echo "Copying API to resources..."
          mkdir -p "$WORKSPACE/src-tauri/resources/api"
          cp -r "$API_DIR/dist" "$WORKSPACE/src-tauri/resources/api/" || true
          cp -r "$API_DIR/src" "$WORKSPACE/src-tauri/resources/api/" || true
          cp -r "$API_DIR/prisma" "$WORKSPACE/src-tauri/resources/api/" || true
          cp "$API_DIR/package.json" "$WORKSPACE/src-tauri/resources/api/" || true
          cp "$API_DIR/package-lock.json" "$WORKSPACE/src-tauri/resources/api/" || true
          cp "$API_DIR/tsconfig.json" "$WORKSPACE/src-tauri/resources/api/" || true
          cp "$API_DIR/nest-cli.json" "$WORKSPACE/src-tauri/resources/api/" || true
          cp "$API_DIR/.env" "$WORKSPACE/src-tauri/resources/api/" || true

          echo "Resources prepared successfully"
          ls -la "$WORKSPACE/src-tauri/resources/api/" || echo "API dir empty"
          ls -la "$WORKSPACE/src-tauri/resources/binaries/" || echo "Binaries dir empty"

      - name: Build frontend (apps/web)
        run: npm --workspace apps/web run build

      # Cargo.lock needs to include newly added Rust deps (e.g. tauri-plugin-sql).
      # CI runners have Rust installed; generate/update lockfile to avoid --locked failures.
      - name: Generate Cargo.lock (src-tauri)
        shell: bash
        run: |
          cd src-tauri
          cargo generate-lockfile

      # Capture build logs as an artifact so failures are diagnosable.
      # Note: This runs an explicit build once to preserve logs, then tauri-action performs the official release build/upload.
      - name: Build Tauri app (capture log)
        id: tauri_build_log
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          echo "Running: npm run tauri build -- ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }} ${{ matrix.bundleArgs }} --verbose"
          npm run tauri build -- ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }} ${{ matrix.bundleArgs }} --verbose 2>&1 | tee tauri-build.log

      - name: Upload tauri build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-${{ matrix.platform }}
          path: tauri-build.log

      - name: Emit failure tail to annotations
        if: steps.tauri_build_log.outcome != 'success'
        shell: bash
        run: |
          echo "---- tauri-build.log (last 120 lines) ----"
          tail -n 120 tauri-build.log || true

          tail -n 20 tauri-build.log > tauri-build.tail.txt || true
          python - <<'PY'
          import pathlib
          p = pathlib.Path("tauri-build.tail.txt")
          s = p.read_text(errors="ignore") if p.exists() else ""
          s = s.strip()[-4000:]
          s = s.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=Tauri build failed::Last lines:%0A{s}")
          PY

      - name: Fail if tauri build failed
        if: steps.tauri_build_log.outcome != 'success'
        shell: bash
        run: |
          echo "Tauri build failed; see artifact tauri-build.log"
          exit 1

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUST_BACKTRACE: 1
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SmartHome v__VERSION__'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target != '' && format('--target {0} {1} --verbose', matrix.target, matrix.bundleArgs) || format('{0} --verbose', matrix.bundleArgs) }}
