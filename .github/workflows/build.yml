name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 提前切换 GitHub Actions JS runtime 到 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 设置 GITHUB_TOKEN 的权限，允许创建 Release
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            bundleArgs: ''
          - platform: 'ubuntu-22.04'
            target: ''
            bundleArgs: ''
          - platform: 'windows-latest'
            target: ''
            # Windows runner 上 MSI 依赖 WiX，失败时会导致整体打包失败；
            # 这里先只打 NSIS（exe），确保能稳定产出可交付安装包。
            bundleArgs: '--bundles nsis'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Rust (Stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libsqlite3-dev pkg-config libssl-dev

      - name: Install dependencies (npm workspaces)
        run: npm install

      - name: Build API and prepare B resources
        shell: bash
        run: |
          set -euo pipefail

          WORKSPACE="${{ github.workspace }}"

          mkdir -p "$WORKSPACE/src-tauri/resources/api"
          mkdir -p "$WORKSPACE/src-tauri/resources/binaries"

          # 0) Generate Prisma Client for PostgreSQL (required for API build)
          echo "Generating Prisma Client..."
          cd "$WORKSPACE/apps/api"
          npm run prisma:generate

          # 1) Build API
          echo "Building API..."
          npm --workspace apps/api run build

          # 2) Generate SQLite seed DB (for offline desktop mode)
          echo "Generating SQLite seed DB..."
          rm -f "$WORKSPACE/apps/api/prisma/desktop-seed.db" "$WORKSPACE/apps/api/prisma/data.db"
          cd "$WORKSPACE/apps/api"
          export DATABASE_URL="file:./desktop-seed.db"
          npm run prisma:dbpush:sqlite
          npm run seed:desktop || echo "Seed skipped"
          cp -f "$WORKSPACE/apps/api/desktop-seed.db" "$WORKSPACE/src-tauri/resources/binaries/seed.db" 2>/dev/null || cp -f "$WORKSPACE/apps/api/prisma/desktop-seed.db" "$WORKSPACE/src-tauri/resources/binaries/seed.db" || echo "No seed db"

          # 3) Copy API source code (without node_modules)
          echo "Copying API source code..."
          cd "$WORKSPACE"
          rm -rf "$WORKSPACE/src-tauri/resources/api/"*

          # Copy all files except node_modules
          cp -r apps/api/dist "$WORKSPACE/src-tauri/resources/api/" 2>/dev/null || true
          cp -r apps/api/src "$WORKSPACE/src-tauri/resources/api/" 2>/dev/null || true
          cp -r apps/api/prisma "$WORKSPACE/src-tauri/resources/api/" 2>/dev/null || true
          cp apps/api/package.json "$WORKSPACE/src-tauri/resources/api/" 2>/dev/null || true
          cp apps/api/package-lock.json "$WORKSPACE/src-tauri/resources/api/" 2>/dev/null || true
          cp apps/api/tsconfig.json "$WORKSPACE/src-tauri/resources/api/" 2>/dev/null || true
          cp apps/api/nest-cli.json "$WORKSPACE/src-tauri/resources/api/" 2>/dev/null || true

          # Verify resources
          echo "Resources prepared:"
          ls -la "$WORKSPACE/src-tauri/resources/api/" 2>/dev/null || echo "API dir empty"
          ls -la "$WORKSPACE/src-tauri/resources/binaries/" 2>/dev/null || echo "Binaries dir empty"

      - name: Build frontend (apps/web)
        run: npm --workspace apps/web run build

      # Cargo.lock needs to include newly added Rust deps (e.g. tauri-plugin-sql).
      # CI runners have Rust installed; generate/update lockfile to avoid --locked failures.
      - name: Generate Cargo.lock (src-tauri)
        shell: bash
        run: |
          cd src-tauri
          cargo generate-lockfile

      # Capture build logs as an artifact so failures are diagnosable.
      # Note: This runs an explicit build once to preserve logs, then tauri-action performs the official release build/upload.
      - name: Build Tauri app (capture log)
        id: tauri_build_log
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          echo "Running: npm run tauri build -- ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }} ${{ matrix.bundleArgs }} --verbose"
          npm run tauri build -- ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }} ${{ matrix.bundleArgs }} --verbose 2>&1 | tee tauri-build.log

      - name: Upload tauri build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-${{ matrix.platform }}
          path: tauri-build.log

      - name: Emit failure tail to annotations
        if: steps.tauri_build_log.outcome != 'success'
        shell: bash
        run: |
          echo "---- tauri-build.log (last 120 lines) ----"
          tail -n 120 tauri-build.log || true

          tail -n 20 tauri-build.log > tauri-build.tail.txt || true
          python - <<'PY'
          import pathlib
          p = pathlib.Path("tauri-build.tail.txt")
          s = p.read_text(errors="ignore") if p.exists() else ""
          s = s.strip()[-4000:]
          s = s.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=Tauri build failed::Last lines:%0A{s}")
          PY

      - name: Fail if tauri build failed
        if: steps.tauri_build_log.outcome != 'success'
        shell: bash
        run: |
          echo "Tauri build failed; see artifact tauri-build.log"
          exit 1

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUST_BACKTRACE: 1
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SmartHome v__VERSION__'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target != '' && format('--target {0} {1} --verbose', matrix.target, matrix.bundleArgs) || format('{0} --verbose', matrix.bundleArgs) }}
