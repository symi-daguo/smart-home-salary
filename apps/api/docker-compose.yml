services:
  postgres:
    image: postgres:17-alpine
    container_name: saas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d saas']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - saas_network
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=1MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - saas_network
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000

  dbgate:
    image: dbgate/dbgate:latest
    container_name: saas_dbgate
    restart: unless-stopped
    ports:
      - '3100:3000'
    volumes:
      - dbgate_data:/root/.dbgate
    environment:
      CONNECTIONS: con1,con2
      LABEL_con1: PostgreSQL
      SERVER_con1: postgres
      USER_con1: postgres
      PASSWORD_con1: postgres
      PORT_con1: 5432
      ENGINE_con1: postgres@dbgate-plugin-postgres
      DATABASE_con1: saas
      LABEL_con2: Redis
      SERVER_con2: redis
      PORT_con2: 6379
      ENGINE_con2: redis@dbgate-plugin-redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    container_name: saas_app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saas
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: change-me-in-production
      JWT_REFRESH_SECRET: change-me-in-production-too
      # Observability
      LOG_PROVIDER: loki
      LOG_LEVEL: info
      LOKI_HOST: http://loki:3100
      TRACING_ENABLED: 'true'
      OTEL_SERVICE_NAME: saas-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      METRICS_PREFIX: saas_
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - saas_network
    volumes:
      # For development hot-reload (comment out for production)
      - ./src:/app/src
      - /app/node_modules

  # Observability Stack
  loki:
    image: grafana/loki:3.0.0
    container_name: saas_loki
    restart: unless-stopped
    ports:
      - '3101:3100'
    volumes:
      - loki_data:/loki
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - saas_network

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: saas_prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - prometheus_data:/prometheus
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    networks:
      - saas_network

  tempo:
    image: grafana/tempo:2.7.0
    container_name: saas_tempo
    restart: unless-stopped
    ports:
      - '3200:3200'   # tempo
      - '4317:4317'   # otlp grpc
      - '4318:4318'   # otlp http
    volumes:
      - tempo_data:/tmp/tempo
      - ./observability/tempo-config.yaml:/etc/tempo/tempo.yaml
    command: ['-config.file=/etc/tempo/tempo.yaml']
    networks:
      - saas_network

  grafana:
    image: grafana/grafana:11.5.1
    container_name: saas_grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - prometheus
      - tempo
    networks:
      - saas_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  dbgate_data:
    driver: local
  loki_data:
    driver: local
  prometheus_data:
    driver: local
  tempo_data:
    driver: local
  grafana_data:
    driver: local

networks:
  saas_network:
    driver: bridge